name: Build & Release Roblox Launcher

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build .NET WPF Project
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1.1

      - name: Restore NuGet packages
        run: nuget restore RobloxMultiLauncher.sln

      - name: Build Solution
        run: msbuild RobloxMultiLauncher.sln /p:Configuration=Release

      - name: Create Release Artifact Folder
        run: |
          mkdir release
          copy "bin\Release\RobloxMultiLauncher.exe" release\

      - name: Upload Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RobloxMultiLauncher
          path: release/

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4

        with:
          name: RobloxMultiLauncher
          path: ./release

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: "Release v${{ github.run_number }}"
          body: "Automated build from commit ${{ github.sha }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: ./release/RobloxMultiLauncher.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}